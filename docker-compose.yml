# Optional local development infrastructure for Nebula: Redis and
# RabbitMQ. PostgreSQL is not included — bring your own server and point
# the framework at it via configuration.
#
#   docker compose up -d
#
# Credentials below are for LOCAL DEVELOPMENT ONLY — production values
# come from configuration, never from this file.

name: nebula

services:
  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: nebula-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nebula
      RABBITMQ_DEFAULT_PASS: nebula_dev
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
  rabbitmq-data:

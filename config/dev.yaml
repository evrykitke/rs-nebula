# Development configuration. Secrets (database.url etc.) belong in
# dev.local.yaml (gitignored) or NEBULA__* environment variables.

server:
  host: 127.0.0.1
  port: 5000
  request_timeout_secs: 30
  # The Angular dev server (ng serve) calls the API cross-origin.
  cors_origins:
    - http://localhost:4200

multitenancy:
  enabled: true
  # Each tenant gets its own database ({slug}-{key}). This is the default;
  # it is spelled out here because a module's rows carry no tenant column —
  # a tenant's isolation is the database it is handed.
  provision_databases: true

# Workers connect through redis.url (docker compose up -d).
jobs:
  enabled: true

# Read-through caching through redis.url (docker compose up -d).
cache:
  enabled: true

# Integration events through RabbitMQ (docker compose up -d); the broker
# URL with credentials lives in dev.local.yaml.
events:
  distributed: true

logging:
  level: info
  format: pretty
  # Per-area overrides: `http: debug` adds request-start lines,
  # `database: debug` shows every SQL statement with its timing.
  # http: debug
  # database: debug
  # Mirror console output to a rolling file under var/ (rolled at 5 MiB).
  file: var/dev.log

currencies:
  - { code: KES, minor_units: 2 }
  - { code: TZS, minor_units: 2 }
  - { code: UGX, minor_units: 0 }
  - { code: RWF, minor_units: 0 }
  - { code: ETB, minor_units: 2 }
  - { code: ZAR, minor_units: 2 }
  - { code: NGN, minor_units: 2 }
  - { code: GHS, minor_units: 2 }
  - { code: USD, minor_units: 2 }
  - { code: EUR, minor_units: 2 }
  - { code: GBP, minor_units: 2 }
  - { code: CHF, minor_units: 2 }
  - { code: CAD, minor_units: 2 }
  - { code: AUD, minor_units: 2 }
  - { code: JPY, minor_units: 0 }
  - { code: CNY, minor_units: 2 }
  - { code: INR, minor_units: 2 }
  - { code: AED, minor_units: 2 }
  - { code: SAR, minor_units: 2 }
  - { code: BHD, minor_units: 3 }

# Nebula base configuration. Overridden by nebula.{environment}.toml and
# NEBULA__* environment variables (e.g. NEBULA__SERVER__PORT=8080).
# Secrets (database.url, redis.url, rabbitmq.url) belong in environment
# variables, not in this file.

[server]
host = "127.0.0.1"
port = 5000
request_timeout_secs = 30

[multitenancy]
enabled = false

[logging]
level = "info"
format = "pretty"
